steps:
  # 1. Build the Docker container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/ares-analytics-gateway:$COMMIT_SHA',
      '-f', 'gateway/Dockerfile',
      '.'
    ]

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ares-analytics-gateway:$COMMIT_SHA']

  # 3. Deploy the image to Cloud Run (Staging environment by default)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'ares-analytics-gateway-staging',
      '--image', 'gcr.io/$PROJECT_ID/ares-analytics-gateway:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--max-instances', '5',
      '--set-env-vars', 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1'
    ]

images:
  - 'gcr.io/$PROJECT_ID/ares-analytics-gateway:$COMMIT_SHA'
