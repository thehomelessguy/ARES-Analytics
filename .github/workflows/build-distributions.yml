name: Build Desktop Packages

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag (e.g. v1.0.3)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  build-packages:
    name: Build package for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            task: ':app:packageMsi'
            artifact-path: 'app/build/compose/binaries/main/msi/'
          - os: macos-latest
            task: ':app:packageDmg'
            artifact-path: 'app/build/compose/binaries/main/dmg/'

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 1. Clone & Build the library (ARESLib-Kotlin)
      - name: Checkout ARESLib-Kotlin
        uses: actions/checkout@v4
        with:
          repository: 'ARES-23247/ARESLib-Kotlin'
          path: 'ARESLib-Kotlin'

      - name: Publish ARESLib-Kotlin locally
        run: |
          cd ARESLib-Kotlin
          chmod +x ./gradlew
          ./gradlew publishToMavenLocal
        shell: bash

      # 2. Clone & Build the main application (ARES-Analytics)
      - name: Checkout ARES-Analytics
        uses: actions/checkout@v4
        with:
          path: 'ARES-Analytics'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build native package
        run: |
          cd ARES-Analytics
          chmod +x ./gradlew
          ./gradlew ${{ matrix.task }}
        shell: bash

      # 3. Upload the packaged installer as an Actions artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARES-Analytics-${{ matrix.os }}
          path: ARES-Analytics/${{ matrix.artifact-path }}

      # 4. Create Release and Upload Assets (Runs only on tag push)
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ARES-Analytics/${{ matrix.artifact-path }}/*.msi
            ARES-Analytics/${{ matrix.artifact-path }}/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
